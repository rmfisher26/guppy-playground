# ── Guppy Playground — docker compose ─────────────────────────────────────
# Usage:
#   docker compose up --build          # start both services
#   docker compose up backend          # backend only
#   docker compose logs -f backend     # tail logs

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      # Hot-reload app code in development (remove for production)
      - ./backend/app:/app/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Astro frontend (dev mode) ────────────────────────────────────────────
  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - /app/node_modules      # anonymous volume prevents host overwrite
    environment:
      PUBLIC_API_URL: "http://localhost:8000"
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4321"
    depends_on:
      backend:
        condition: service_healthy
