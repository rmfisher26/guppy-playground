# ── Guppy Playground — docker compose ─────────────────────────────────────
# Usage:
#   docker compose up --build          # start both services
#   docker compose up backend          # backend only
#   docker compose logs -f backend     # tail logs

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOWED_ORIGINS=["http://localhost:4321","https://guppyfisher.dev"]
    volumes:
      # Hot-reload in dev — remove this volume mount for production builds
      - ./backend/app:/app/app:ro

    # mem_limit is the correct key for plain `docker compose` (non-Swarm).
    # deploy.resources.limits is Swarm-only and silently ignored here.
    # Statevector sim cap is 20 qubits = 16 MB; 1 GB covers the Python
    # process, two uvicorn workers, and subprocess overhead with room to spare.
    mem_limit: 1g
    memswap_limit: 1g        # disables swap so OOM kills cleanly instead of thrashing

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s      # guppylang import on first startup takes a few seconds
      retries: 3

  # ── Astro frontend (dev mode) ────────────────────────────────────────────
  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "4321:4321"
    volumes:
      - ./frontend:/app
      - /app/node_modules    # anonymous volume — prevents host node_modules overwrite
    environment:
      # Use http://localhost:8000 to point at the local backend instead
      PUBLIC_API_URL: "http://localhost:8000"
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4321"
    mem_limit: 512m
    depends_on:
      backend:
        condition: service_healthy
